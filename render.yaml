services:
  - type: web
    name: flowmove-booking
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /api/healthz
    numInstances: 1
    envVars:
      - key: NODE_VERSION
        value: 22.7.0
      - key: DATA_DIR
        value: /var/data/flowmove
    disk:
      name: flowmove-data
      mountPath: /var/data
      sizeGB: 1
